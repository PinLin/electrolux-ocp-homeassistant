name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements_test.txt
      - name: Install test dependencies
        run: pip install -r requirements_test.txt
      - name: Run pytest
        run: pytest tests/ -v
